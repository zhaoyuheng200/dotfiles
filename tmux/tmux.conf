set-environment -gF TMUX_PLUGIN_MANAGER_PATH '#{XDG_CONFIG_HOME}/tmux/plugins/'
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
# set -g default-terminal "tmux-256color"
# List of plugins
# tpm and tmux-sensible
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'dreknix/tmux-primary-ip'
# catppuccin
set -g @plugin 'catppuccin/tmux#v2.1.1'
set -g @catppuccin_flavor 'macchiato'
# battery
set -g @plugin 'tmux-plugins/tmux-battery'
# cpu
set -g @plugin 'tmux-plugins/tmux-cpu'
# ressurect 
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-processes '"kiro-cli chat->kiro-cli chat --resume"'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# Keep only the 10 most recent resurrect saves
run-shell 'ls -t ~/.local/share/tmux/resurrect/tmux_resurrect_*.txt 2>/dev/null | tail -n +11 | xargs -r rm --'
# vim-tmux-navigator
set -g @plugin 'christoomey/vim-tmux-navigator'
# tmux-yank copy to system clipboard
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'

# > Yes — allow-passthrough is on.
# That's why the OSC 9 escape sequences pass through tmux to WezTerm.
# Without this, tmux would swallow them and
# the notifications wouldn't reach your Mac.
set -g allow-passthrough on

unbind r
bind r source-file ~/.config/tmux/tmux.conf

unbind x
bind x kill-pane
bind C command-prompt -p "New session name:" "new-session -s '%%'"
bind e display-popup -E -w 80% -h 80%
bind f display-popup -E "tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name}' | fzf --reverse | cut -d' ' -f1 | xargs tmux switch-client -t"


set -g mouse on
setw -g mode-keys vi

# set prefix to C-a
set -g prefix C-a
bind C-a send-prefix
bind a last-window

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set-option -g status-position top
# Per-pane label at bottom of each pane showing running command and formatted
# directory. Uses catppuccin pill-style separators and theme colors.
# #{pane_current_command} is per-pane (unlike #W which is per-window).
set -g pane-border-status bottom
set -g pane-border-lines heavy
set -g pane-border-format "#(~/.config/tmux/pane_border_format.sh #{pane_active} #{pane_current_command} #{pane_current_path} '#{pane_title}')"

# Window name: "title:command" when pane_title is set, otherwise just command.
# pane_title defaults to hostname, so we compare against it to detect custom titles.
set -g automatic-rename-format "#{?#{==:#{pane_title},#{host}},#{pane_current_command},#{pane_title}:#{pane_current_command}}"


# Catppuccin
# load custom moudules
#
set -g @catppuccin_window_status_style "rounded"
#
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_number "#I"
set -g @catppuccin_window_text " #W"
#
set -g @catppuccin_window_current_text " #W#{?window_zoomed_flag,(󰁌),}"
#
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_middle_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_module_bg_color "#{@thm_surface_0}"

set -g @catppuccin_date_time_text " %Y-%m-%d %H:%M"
set -g @catppuccin_cpu_text " #(~/.config/tmux/cpu_usage.sh)"

# Explicitly set directory icon — catppuccin uses set -ogq (dont overwrite),
# so if the icon gets cleared (e.g. by a bad override), it wont restore on reload.
# Only a tmux server restart or this explicit set will fix it.
set -g @catppuccin_directory_icon " "

set -g @catppuccin_icon_window_last "󰖰"
set -g @catppuccin_icon_window_current "󰖯"
set -g @catppuccin_icon_window_zoom "󰁌"
set -g @catppuccin_icon_window_mark "󰃀"
set -g @catppuccin_icon_window_silent "󰂛"
set -g @catppuccin_icon_window_activity "󱅫"
set -g @catppuccin_icon_window_bell "󰂞"

run "~/.config/tmux/plugins/tmux/catppuccin.tmux"

set -g status-right-length 200
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -ag status-left "#{E:@catppuccin_status_directory}"
set -gF status-right "#{E:@catppuccin_status_cpu}"
source -F '#{d:current_file}/custom_modules/ram.conf'
set -agF status-right "#{E:@catppuccin_status_ram}"
# This config is shared across Amazon cloud desktops and personal machines (Mac, etc).
# Battery and primary IP are hidden on cloud desktops (hostname "dev-dsk-*") since
# they have no battery and the IP is not useful. On personal machines they show normally.
if-shell "! hostname | grep -q '^dev-dsk-'" {
    set -agF status-right "#{E:@catppuccin_status_battery}"
}
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -ag status-right "#{E:@catppuccin_status_host}"
if-shell "! hostname | grep -q '^dev-dsk-'" {
    source -F '#{d:current_file}/custom_modules/primary_ip.conf'
    set -agF status-right '#{E:@catppuccin_status_primary_ip}'
}
set -ag status-right "#{E:@catppuccin_status_date_time}"

# Bug: cpu and bettery doesn't get loaded automatically for some reason
# manually load them here
# ---
# 2026/03/26 update: looks like they auto load now.
# if-shell "[ -f ~/.config/tmux/plugins/tmux-cpu/cpu.tmux ]" {
#     run "~/.config/tmux/plugins/tmux-cpu/cpu.tmux"
# }
# if-shell "[ -f ~/.config/tmux/plugins/tmux-battery/battery.tmux ]" {
#     run "~/.config/tmux/plugins/tmux-battery/battery.tmux"
# }


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# Alert on missing plugins (after tpm so it's the last message shown)
# Run after tpm so our display-message overrides any plugin error messages.
# See check_plugins.sh for details on why this is needed.
run-shell '~/.config/tmux/check_plugins.sh'
