%hidden MODULE_NAME='cpu'

set -gq "@catppuccin_${MODULE_NAME}_icon" " "
set -gqF "@catppuccin_${MODULE_NAME}_color" "#{E:@thm_yellow}"
set -gq "@catppuccin_${MODULE_NAME}_text" " #{l:#(~/.config/tmux/cpu_usage.sh)}"

# Clear dynamic color overrides from catppuccin's built-in cpu module —
# they depend on tmux-cpu's #{cpu_fg_color}/#{cpu_bg_color} which aren't
# reliably populated via catppuccin v2's indirection.
set -Ugq "@catppuccin_status_${MODULE_NAME}_text_fg"
set -Ugq "@catppuccin_status_${MODULE_NAME}_text_bg"

source -F '#{TMUX_PLUGIN_MANAGER_PATH}/tmux/utils/status_module.conf'
