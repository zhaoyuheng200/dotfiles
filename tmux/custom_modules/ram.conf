%hidden MODULE_NAME='ram'

set -gq "@catppuccin_${MODULE_NAME}_icon" "󰍛 "
set -gqF "@catppuccin_${MODULE_NAME}_color" "#{E:@thm_green}"
set -gq "@catppuccin_${MODULE_NAME}_text" " #{l:#(~/.config/tmux/ram_usage.sh)}"

# Clear dynamic color overrides from catppuccin's built-in ram module (v2.3.0+)
set -Ugq "@catppuccin_status_${MODULE_NAME}_text_fg"
set -Ugq "@catppuccin_status_${MODULE_NAME}_text_bg"

source -F '#{TMUX_PLUGIN_MANAGER_PATH}/tmux/utils/status_module.conf'
